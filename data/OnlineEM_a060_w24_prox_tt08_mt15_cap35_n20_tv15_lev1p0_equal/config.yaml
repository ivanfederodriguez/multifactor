strategy:
  training_window: 504
  training_frequency: QUARTERLY
  rebalance_frequency: MONTHLY
  model_config:
    name: dqi_multifactor
    min_history: 252
    signal_generator:
      name: dqi_signal
      params:
        z_grouping: sub_industry
        regime_weights: true
        weights_mode: dynamic
        weights_file: Data/dqi_weights_online_em_a060_w24_prox_tt08_mt15_cap35.csv
    portfolio_constructor:
      name: dqi_quintile
      params:
        n_positions: 20
        long_only: true
        weights_mode: equal
    risk_overlay:
      name: dqi_vol_target
      params:
        target_vol: 0.15
        vol_lookback: 63
        max_leverage: 1.0
environment:
  starting_cash: 1000000
  base_currency: USD
  max_leverage: 1.0
  add_noise: false
  interest_settlement_frequency: MONTHLY
  min_weight: 0.0001
  margin_rate: 0.5
  financing_rates:
    LONG: 0.0
    SHORT: 0.01
  collateral_rates:
    LONG: 0.0
    SHORT: 1.0
  fee_per_share: 0.005
  min_fee: 1.0
  max_fee_pct: 0.01
  add_slippage: true
  cash_rates:
    USD:
      debit: 0.04
      credit: 0.05
testing:
  random_seed: 42
  benchmark: SPY
  start_date: '2013-01-31'
  end_date: '2025-12-31'
experiment:
  schema: OnlineEM
  weight_model: proximal_smooth
  normalizacion: optimizacion
  alpha: 0.6
  training_months: 24
  risk_aversion: 1.0
  turnover_penalty: 1.0
  target_turnover: 0.08
  max_turnover: 0.15
  lambda_min: 0.0
  lambda_max: 500.0
  max_weight: 0.35
  target_vol: 0.15
  max_leverage: 1.0
  portfolio_weighting: equal
  n_positions: 20
